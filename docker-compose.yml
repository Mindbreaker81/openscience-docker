services:
  openscience:
    build: .
    ports:
      # Bound to the server's loopback only — access from other machines via
      # Tailscale (`tailscale serve --bg 3000` on the server, see README)
      # or an SSH tunnel: ssh -L 3000:localhost:3000 user@server
      # (OpenScience has no auth of its own; do NOT expose this port
      # directly to the network.)
      - "127.0.0.1:3000:3000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      # - OPENAI_API_KEY=${OPENAI_API_KEY}
      # - GEMINI_API_KEY=${GEMINI_API_KEY}
      # Extra HTTPS origins allowed by the server's Origin guard.
      # For Tailscale, set this in .env to your tailnet's DNS name
      # (Admin console → DNS), e.g. OPENSCIENCE_CORS_DOMAINS=tail1a2b3c.ts.net
      - OPENSCIENCE_CORS_DOMAINS=${OPENSCIENCE_CORS_DOMAINS:-}
    volumes:
      - ./workspace:/workspace
      - openscience-config:/home/researcher/.config/openscience
      # auth.json (keys added via UI/CLI), sessions/chat history, logs
      - openscience-data:/home/researcher/.local/share/openscience
    restart: unless-stopped

volumes:
  openscience-config:
  openscience-data:
