services:
  openscience:
    build: .
    ports:
      # Bound to the server's loopback only — access from other machines via
      # Tailscale (`tailscale serve --bg 3000` on the server, see README)
      # or an SSH tunnel: ssh -L 3000:localhost:3000 user@server
      # (OpenScience has no auth of its own; do NOT expose this port
      # directly to the network.)
      - "127.0.0.1:${OPENSCIENCE_HOST_PORT:-3000}:3000"
    # Every variable you uncomment in .env is passed to the container:
    # provider keys (ANTHROPIC_API_KEY, OPENAI_API_KEY, OPENROUTER_API_KEY,
    # GEMINI_API_KEY, GOOGLE_API_KEY, ...) and OPENSCIENCE_CORS_DOMAINS.
    env_file:
      - .env
    volumes:
      - ./workspace:/workspace
      - openscience-config:/home/researcher/.config/openscience
      # auth.json (keys added via UI/CLI), sessions/chat history, logs
      - openscience-data:/home/researcher/.local/share/openscience
    restart: unless-stopped

volumes:
  openscience-config:
  openscience-data:
